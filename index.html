function getKSTDate(offsetDays) {
  const now = new Date();
  const kst = new Date(now.getTime() + 9 * 60 * 60 * 1000);
  kst.setUTCDate(kst.getUTCDate() + (offsetDays || 0));
  return kst.toISOString().slice(0, 10);
}

const LEVELS = [
  { lv: 1, name: "알", emoji: "🥚", min: 0 },
  { lv: 2, name: "씨앗", emoji: "🌰", min: 30 },

  { lv: 8, name: "마스터", emoji: "👑", min: 1000 },
];

function getLevel(totalReps) {
  let cur = LEVELS[0];
  for (const l of LEVELS) {
    if (totalReps >= l.min) cur = l;
  }
  const next = LEVELS.find(l => l.min > totalReps);
  const prevMin = cur.min;
  const nextMin = next ? next.min : cur.min;
  const progress = next ? ((totalReps - prevMin) / (nextMin - prevMin)) * 100 : 100;
  return { ...cur, next, progress: Math.min(100, progress), toNext: next ? next.min - totalReps : 0 };
}

function getBadges(streak, doneCards, totalCards) {

}

async function sbGet() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/flashcards?user_id=eq.${USER_ID}&select=data`, {
      headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
    });
    const rows = await res.json();
    if (rows && rows.length > 0) return rows[0].data;
    return null;
  } catch(e) { return null; }
}

async function sbSave(data) {
  try {
    // 먼저 기존 row 삭제
    await fetch(`${SUPABASE_URL}/rest/v1/flashcards?user_id=eq.${USER_ID}`, {
      method: "DELETE",
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`
      }
    });
    // 새로 insert
    await fetch(`${SUPABASE_URL}/rest/v1/flashcards`, {
      method: "POST",
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ user_id: USER_ID, data, updated_at: new Date().toISOString() })
    });
  } catch(e) {}
}

function shuffle(a) {
  const b = [...a];
  for (let i = b.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [b[i], b[j]] = [b[j], b[i]];
  }
  return b;
}

  function buildQueue(c, pd = perDay) {
    const todayDone = c.filter(x => x.lastReviewed === TODAY);
    const todayDoneIds = new Set(todayDone.map(x => x.id));
    const due = shuffle(c.filter(x => x.inn && x.nr && x.nr <= TODAY && !todayDoneIds.has(x.id)));
    const newCards = shuffle(c.filter(x => !x.inn));
    const needed = Math.max(0, pd - todayDone.length);
    // 새 카드 최소 2개 보장
    const minNew = Math.min(2, newCards.length);
    const maxDue = Math.max(0, needed - minNew);
    const dueToShow = due.slice(0, maxDue);
    const newToShow = newCards.slice(0, Math.max(minNew, needed - dueToShow.length));
    const q = shuffle([...dueToShow, ...newToShow]);
    setQueue(q);
    setOriginalCount(q.length);
    const perfectIds = todayDone.filter(x => {
      const nd = new Date(x.nr || TODAY);
      return Math.round((nd - new Date(TODAY)) / 86400000) > 2;
    }).map(x => x.id);
    setSeenIds(perfectIds);
    setQi(0);
    setResults([]);
  }

  async function handleAnswer(rating) {
    const c = queue[qi];
    let ef = c.ef || 2.5;
    let rp = c.rp || 0;
    let iv = c.iv || 1;

    if (rating === "again") {
      // 다시 볼게: 반복 리셋, ef 감소, 오늘 세션에서 다시
      ef = Math.max(1.3, ef - 0.2);
      const remaining = queue.length - qi - 1;
      const minGap = Math.min(3, remaining);
      const insertAt = qi + 1 + minGap + Math.floor(Math.random() * Math.max(1, remaining - minGap + 1));
      const newQ = [...queue];
      newQ.splice(insertAt, 0, { ...c, ef, rp: 0, iv: 1 });
      setQueue(newQ);
      const updated = cards.map(x => x.id === c.id ? { ...x, ef, rp: 0, iv: 1, inn: true, lastReviewed: TODAY } : x);
      await saveAll(updated, { c: streak, l: TODAY }, perDay);
      setNextMsg("잠시 후 다시 나올 거야 💪");
      setTimeout(() => { setQi(qi + 1); setRevealed(false); setNextMsg(""); }, 800);
      return;
    }

    // SM-2 quality: ok=3, easy=5
    const q = rating === "easy" ? 5 : 3;
    // ef 업데이트 (SM-2 공식)
    ef = ef + (0.1 - (5 - q) * (0.08 + (5 - q) * 0.02));
    ef = Math.max(1.3, ef);

    // 반복 횟수에 따른 간격 (핵심!)
    rp = rp + 1;
    let ni;
    if (rp === 1) {
      ni = rating === "easy" ? 4 : 1;
    } else if (rp === 2) {
      ni = rating === "easy" ? 7 : 4;
    } else {
      // 3번째부터는 이전 간격 × ef → 점점 길어짐
      ni = Math.round(iv * ef);
    }

    // 지연 복습 보너스: 예정일보다 늦게 봤는데 기억했으면 간격 더 늘림
    if (c.nr && rp >= 2) {
      const due = new Date(c.nr);
      const now = new Date(TODAY);
      const overdueDays = Math.round((now - due) / 86400000);
      if (overdueDays > 0) {
        // 늦은 만큼 절반을 보너스로 추가 (기억이 더 굳었다는 증거)
        ni = ni + Math.round(overdueDays * 0.5);
      }
    }

    ni = Math.max(1, Math.min(ni, 180)); // 최대 6개월

    const nd = new Date(TODAY); nd.setDate(nd.getDate() + ni);
    const nextDate = nd.toISOString().slice(0, 10);
    const updated = cards.map(x => x.id === c.id
      ? { ...x, iv: ni, ef, nr: nextDate, rp, inn: true, lastReviewed: TODAY }
      : x);
    await saveAll(updated, { c: streak, l: TODAY }, perDay);
    setResults(prev => [...prev, { e: c.e, k: c.k, t: c.t, rating }]);
    setNextMsg(`다음 복습: ${ni}일 후 (${rp}회째)`);
    setSeenIds(prev => prev.includes(c.id) ? prev : [...prev, c.id]);
    // 이 카드가 큐 뒤쪽에 또 있으면(다시 볼게로 재삽입) 제거
    setQueue(prevQ => {
      const cleaned = prevQ.filter((card, idx) => idx <= qi || card.id !== c.id);
      return cleaned;
    });
    setTimeout(() => { setQi(qi + 1); setRevealed(false); setNextMsg(""); }, 800);
  }

  const currentCard = queue[qi];

  if (loading) return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "300px", fontFamily: "-apple-system, sans-serif" }}>
      <div style={{ textAlign: "center" }}>
        <div style={{ fontSize: 40, marginBottom: 12 }}>🗣️</div>
        <div style={{ fontSize: 14, color: "#6e6e73" }}>Say It 불러오는 중...</div>
      </div>
    </div>
  );

  return (
    <div style={{ maxWidth: 600, margin: "0 auto", padding: "1.5rem 1rem", fontFamily: "-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif", background: "#f5f5f7", minHeight: "100vh", position: "relative" }}>
      {toast && (
        <div style={{ position: "fixed", top: 16, left: "50%", transform: "translateX(-50%)", background: "#1d1d1f", color: "#f5f5f7", borderRadius: 10, padding: "8px 16px", fontSize: 13, zIndex: 100 }}>
          {toast}
        </div>
      )}

      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: "1.25rem" }}>
        <div style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
          <div style={{ fontSize: 22, fontWeight: 700, letterSpacing: "-0.02em", color: "#1d1d1f" }}>Say It</div>
          <div style={{ fontSize: 11, color: "#6e6e73" }}>말하면서 외우는 영어</div>
        </div>
        <div style={{ fontSize: 12, color: "#6e6e73" }}>
          🔥 {streak > 0 ? `${streak}일 연속` : "오늘 시작!"}
          {streakData.freezes > 0 && <span style={{ marginLeft: 6 }}>· ❄️ {streakData.freezes}</span>}
        </div>
      </div>

      <div style={{ display: "flex", gap: 4, marginBottom: "1.25rem", flexWrap: "wrap" }}>
        {[["review","복습"], ["today","오늘 완료 ✅"], ["add","문장 추가"], ["list","전체 카드"], ["settings","설정 ⚙️"]].map(([key, label]) => (
          <button key={key} onClick={() => setTab(key)} style={{
            padding: "6px 11px", borderRadius: 8, fontSize: 12, fontWeight: 500, cursor: "pointer",
            border: "1px solid", borderColor: tab === key ? "#d2d2d7" : "transparent",
            background: tab === key ? "#e8e8ed" : "transparent",
            color: tab === key ? "#1d1d1f" : "#6e6e73"
          }}>{label}</button>
        ))}
      </div>

      {tab === "review" && !started && (
        <div style={{ padding: "0.5rem 0" }}>
          {/* 시작 카드 (최상단) */}
          {total > 0 ? (
            <div style={{ background: "#fff", borderRadius: 14, padding: "26px 16px", marginBottom: 10, textAlign: "center" }}>
              <div style={{ fontSize: 44 }}>🗣️</div>
              <div style={{ fontSize: 18, fontWeight: 700, color: "#1d1d1f", marginTop: 8 }}>
                {alreadyReviewedToday ? "한 번 더 말해볼까?" : "오늘도 소리 내서 말해보자"}
              </div>
              <div style={{ fontSize: 13, color: "#6e6e73", marginTop: 5 }}>
                카드 {total}개 준비됐어 · {Math.max(2, Math.round(total * 0.6))}분이면 끝나
              </div>
              <button onClick={() => { setStarted(true); setRevealed(false); }} style={{
                padding: "13px 36px", background: "#0071e3", border: "none", borderRadius: 10,
                fontSize: 15, fontWeight: 600, color: "#fff", cursor: "pointer", marginTop: 14
              }}>Say It →</button>
              {todayCards.length === 0 && streak > 0 && (
                <div style={{ marginTop: 12, fontSize: 11, color: "#ff3b30", fontWeight: 600 }}>
                  ⚠️ 오늘 안 하면 {streak}일 연속이 끊겨요
                </div>
              )}
            </div>
          ) : (
            <div style={{ background: "#fff", borderRadius: 14, padding: "26px 16px", marginBottom: 10, textAlign: "center" }}>
              <div style={{ fontSize: 44 }}>🎉</div>
              <div style={{ fontSize: 18, fontWeight: 700, color: "#1d1d1f", marginTop: 8 }}>오늘 복습 다 했어!</div>
              <div style={{ fontSize: 13, color: "#6e6e73", marginTop: 5, lineHeight: 1.6 }}>
                내일 또 새로운 카드가 준비될 거야<br/>
                Claude한테 "오늘 대화 연습 해줘" 라고 해봐 💬
              </div>
            </div>
          )}

          {/* 레벨 카드 (최근 7일 포함) */}
          {(() => {
            const totalReps = cards.reduce((s, c) => s + (c.rp || 0), 0);
            const doneCards = cards.filter(c => c.inn).length;
            const lvl = getLevel(totalReps);
            return (
              <div style={{ background: "#fff", borderRadius: 14, padding: 14, marginBottom: 10 }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
                    <span style={{ fontSize: 21 }}>{lvl.emoji}</span>
                    <div>
                      <div style={{ fontSize: 14, fontWeight: 700, color: "#1d1d1f" }}>Lv.{lvl.lv} {lvl.name}</div>
                      <div style={{ fontSize: 10, color: "#6e6e73" }}>총 {totalReps}회 · 완료 {doneCards}개</div>
                    </div>
                  </div>
                  {lvl.next && <div style={{ fontSize: 10, color: "#6e6e73" }}>다음까지 {lvl.toNext}회</div>}
                </div>
                <div style={{ height: 7, background: "#e8e8ed", borderRadius: 4, overflow: "hidden" }}>
                  <div style={{ height: "100%", width: `${lvl.progress}%`, background: "linear-gradient(90deg,#0071e3,#5856d6)", borderRadius: 4 }} />
                </div>
                <div style={{ marginTop: 10, paddingTop: 10, borderTop: "1px solid #e8e8ed", fontSize: 11, color: "#6e6e73", textAlign: "center" }}>
                  최근 7일 <span style={{ fontSize: 14, letterSpacing: 2, marginLeft: 4 }}>{(() => {
                    const days = [];
                    for (let i = 6; i >= 0; i--) {
                      const d = new Date(TODAY); d.setDate(d.getDate() - i);
                      const ds = d.toISOString().slice(0, 10);
                      const rec = (streakData.history || []).find(h => h.d === ds);
                      if (rec) days.push(rec.done ? "🔥" : "❄️");
                      else days.push("·");
                    }
                    return days.join("");
                  })()}</span>
                </div>
              </div>
            );
          })()}

          {/* 뱃지 */}
          {(() => {
            const doneCards = cards.filter(c => c.inn).length;
            const badges = getBadges(streak, doneCards, cards.length);
            const earnedCount = badges.filter(b => b.earned).length;
            return (
              <div style={{ background: "#fff", borderRadius: 14, padding: 14 }}>
                <div style={{ fontSize: 11, color: "#6e6e73", marginBottom: 10, fontWeight: 600 }}>
                  뱃지 <span style={{ color: "#0071e3", marginLeft: 4 }}>{earnedCount}/8</span>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 8 }}>
                  {badges.map(b => (
                    <div key={b.label} style={{ textAlign: "center", opacity: b.earned ? 1 : 0.25 }}>
                      <div style={{ fontSize: 22 }}>{b.emoji}</div>
                      <div style={{ fontSize: 8, color: b.earned ? "#1d1d1f" : "#6e6e73", fontWeight: b.earned ? 600 : 400, marginTop: 2 }}>{b.label}</div>
                    </div>
                  ))}
                </div>
              </div>
            );
          })()}
        </div>
      )}

      {tab === "review" && started && (
        <div>
          <div style={{ display: "flex", alignItems: "baseline", justifyContent: "center", gap: 6, marginBottom: 10 }}>
            <span style={{ fontSize: 28, fontWeight: 700, color: "#1d1d1f" }}>{seenIds.length}</span>
            <span style={{ fontSize: 16, color: "#6e6e73" }}>/ {originalCount}</span>
          </div>
          <div style={{ height: 6, background: "#d2d2d7", borderRadius: 3, marginBottom: "1.5rem", overflow: "hidden" }}>
            <div style={{ height: "100%", width: `${originalCount > 0 ? (seenIds.length / originalCount) * 100 : 0}%`, background: "#0071e3", borderRadius: 3, transition: "width 0.3s" }} />
          </div>

          {!isDone ? (
            <div>
              <div onClick={() => !revealed && setRevealed(true)} style={{
                background: "#ffffff", border: "1px solid #d2d2d7", borderRadius: 14,
                padding: "1.75rem 1.5rem", minHeight: 190, cursor: revealed ? "default" : "pointer",
                marginBottom: 10
              }}>
                <div style={{ fontSize: 11, color: "#6e6e73", marginBottom: 14, display: "flex", gap: 8, alignItems: "center" }}>
                  <span>{currentCard?.t}</span>
                  <span style={{ background: "#e8e8ed", borderRadius: 4, padding: "2px 8px", fontSize: 11 }}>{currentCard?.ty}</span>
                </div>
                <div style={{ fontSize: 17, lineHeight: 1.7, color: "#1d1d1f", whiteSpace: "pre-line" }}>
                  {currentCard?.k?.replace(/\\n/g, '\n')}
                </div>
                {!revealed && <div style={{ fontSize: 13, color: "#aeaeb2", marginTop: 12 }}>영어로 소리 내서 말해봐 → 탭해서 확인</div>}
                {revealed && (
                  <div style={{ fontSize: 15, color: "#6e6e73", lineHeight: 1.7, marginTop: 14, paddingTop: 14, borderTop: "1px solid #d2d2d7", whiteSpace: "pre-line" }}>
                    {currentCard?.e?.replace(/\\n/g, '\n')}
                  </div>
                )}
              </div>

              {!revealed ? (
                <button onClick={() => setRevealed(true)} style={{
                  width: "100%", padding: 11, background: "#ffffff", border: "1px solid #d2d2d7",
                  borderRadius: 10, fontSize: 14, color: "#6e6e73", cursor: "pointer", marginBottom: 10
                }}>영어 보기</button>
              ) : (
                <div>
                  {nextMsg && <div style={{ fontSize: 12, color: "#6e6e73", textAlign: "center", marginBottom: 8 }}>{nextMsg}</div>}
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 8, marginBottom: 10 }}>
                    {(() => {
                      const c = queue[qi] || {};
                      const rp = c.rp || 0;
                      const ef = c.ef || 2.5;
                      const iv = c.iv || 1;
                      const calcNext = (rating) => {
                        const nrp = rp + 1;
                        let ni;
                        if (nrp === 1) ni = rating === "easy" ? 4 : 1;
                        else if (nrp === 2) ni = rating === "easy" ? 7 : 4;
                        else ni = Math.round(iv * ef);
                        return Math.max(1, Math.min(ni, 180));
                      };
                      const okDays = calcNext("ok");
                      const easyDays = calcNext("easy");
                      return (
                        <>
                          <button onClick={() => handleAnswer("again")} style={{ background: "#ffffff", border: "1px solid #ff3b30", color: "#ff3b30", borderRadius: 10, padding: "10px 6px", fontSize: 13, fontWeight: 600, cursor: "pointer", lineHeight: 1.4 }}>
                            다시 볼게<br/><span style={{ fontSize: 11, fontWeight: 400 }}>곧 다시</span>
                          </button>
                          <button onClick={() => handleAnswer("ok")} style={{ background: "#ffffff", border: "1px solid #5856d6", color: "#5856d6", borderRadius: 10, padding: "10px 6px", fontSize: 13, fontWeight: 600, cursor: "pointer", lineHeight: 1.4 }}>
                            애매해<br/><span style={{ fontSize: 11, fontWeight: 400 }}>{okDays}일 후</span>
                          </button>
                          <button onClick={() => handleAnswer("easy")} style={{ background: "#ffffff", border: "1px solid #0071e3", color: "#0071e3", borderRadius: 10, padding: "10px 6px", fontSize: 13, fontWeight: 600, cursor: "pointer", lineHeight: 1.4 }}>
                            완벽해<br/><span style={{ fontSize: 11, fontWeight: 400 }}>{easyDays}일 후</span>
                          </button>
                        </>
                      );
                    })()}
                  </div>
                </div>
              )}
            </div>
          ) : (
            <div style={{ textAlign: "center", padding: "2.5rem 1rem" }}>
              <div style={{ fontSize: 48, marginBottom: 12 }}>🎉</div>
              <div style={{ fontSize: 20, fontWeight: 600, marginBottom: 8, color: "#1d1d1f" }}>오늘 복습 끝!</div>
              <div style={{ fontSize: 14, color: "#6e6e73", lineHeight: 1.6, marginBottom: 16 }}>
                {originalCount}개 중 완벽하게 외운 거 {seenIds.length}개! 수고했어 👏
              </div>
              {/* XP 획득 */}
              {(() => {
                const totalReps = cards.reduce((s, c) => s + (c.rp || 0), 0);
                const lvl = getLevel(totalReps);
                return (
                  <div style={{ background: "#e8f0fb", borderRadius: 12, padding: 14, marginBottom: 16 }}>
                    <div style={{ fontSize: 12, color: "#0071e3", fontWeight: 600, marginBottom: 6 }}>+{originalCount} XP 획득!</div>
                    <div style={{ height: 6, background: "#d2d2d7", borderRadius: 3, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${lvl.progress}%`, background: "#0071e3", borderRadius: 3 }} />
                    </div>
                    <div style={{ fontSize: 11, color: "#6e6e73", marginTop: 6 }}>
                      {lvl.emoji} Lv.{lvl.lv} {lvl.name}
                      {lvl.next && ` · 다음 레벨까지 ${lvl.toNext}회`}
                    </div>
                  </div>
                );
              })()}
              <div style={{ fontSize: 13, color: "#6e6e73", marginBottom: 12 }}>
                🔥 {streak}일 연속 유지 중!
              </div>
              <div style={{ fontSize: 13, color: "#6e6e73", marginBottom: 20 }}>
                "오늘 대화 연습 해줘" 라고 Claude한테 말해봐 💬
              </div>
              <button onClick={() => setStarted(false)} style={{
                padding: "12px 32px", background: "#0071e3", border: "none",
                borderRadius: 10, fontSize: 15, cursor: "pointer", color: "#fff", fontWeight: 600
              }}>처음 화면으로 →</button>
            </div>
          )}
        </div>
      )}

      {tab === "today" && (
        <div>
          {todayCards.length === 0 ? (
            <div style={{ textAlign: "center", padding: "2rem", color: "#6e6e73", fontSize: 14 }}>
              오늘 아직 복습한 카드가 없어!
            </div>
          ) : (
            <div>
              <div style={{ fontSize: 13, color: "#6e6e73", marginBottom: 12 }}>오늘 복습한 {todayCards.length}개</div>
              <button onClick={() => {
                const text = todayCards.map(c => `${c.k}\n${c.e.split('\n')[0]}`).join('\n\n');
                navigator.clipboard.writeText(text).then(() => showToast('복사됐어! Claude에 붙여넣기 해줘 😊')).catch(() => showToast('복사 실패'));
              }} style={{ width: "100%", padding: 10, background: "#ffffff", border: "1px solid #d2d2d7", borderRadius: 10, fontSize: 13, cursor: "pointer", marginBottom: 12, color: "#0071e3" }}>
                오늘 완료 목록 복사 📋
              </button>
              {todayCards.map((c, i) => (
                <div key={i} style={{ background: "#e8e8ed", borderRadius: 8, padding: "10px 12px", marginBottom: 6 }}>
                  <div style={{ fontSize: 14, fontWeight: 500, color: "#1d1d1f" }}>{c.k}</div>
                  <div style={{ fontSize: 12, color: "#0071e3", marginTop: 3 }}>{c.e.split("\n")[0]}{c.e.includes("\n") ? "…" : ""}</div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {tab === "add" && (
        <div style={{ border: "1px dashed #d2d2d7", borderRadius: 12, padding: "1.25rem" }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: "#6e6e73", marginBottom: 10 }}>새 문장 추가</div>
          <input value={newEng} onChange={e => setNewEng(e.target.value)} placeholder="영어 문장" style={{ width: "100%", padding: "9px 12px", border: "1px solid #d2d2d7", borderRadius: 8, fontSize: 14, marginBottom: 8, fontFamily: "inherit", background: "#ffffff", color: "#1d1d1f" }} />
          <input value={newKor} onChange={e => setNewKor(e.target.value)} placeholder="뜻 (한국어)" style={{ width: "100%", padding: "9px 12px", border: "1px solid #d2d2d7", borderRadius: 8, fontSize: 14, marginBottom: 8, fontFamily: "inherit", background: "#ffffff", color: "#1d1d1f" }} />
          <input value={newCtx} onChange={e => setNewCtx(e.target.value)} placeholder="주제/상황 메모 (선택)" style={{ width: "100%", padding: "9px 12px", border: "1px solid #d2d2d7", borderRadius: 8, fontSize: 14, marginBottom: 8, fontFamily: "inherit", background: "#ffffff", color: "#1d1d1f" }} />
          <button onClick={addCard} style={{ width: "100%", padding: 10, background: "#ffffff", border: "1px solid #d2d2d7", borderRadius: 8, fontSize: 14, cursor: "pointer", color: "#1d1d1f" }}>+ 추가하기</button>
        </div>
      )}

      {tab === "list" && (
        <div>
          {cards.map((c, i) => (
            <div key={i} style={{ background: "#e8e8ed", borderRadius: 8, padding: "10px 12px", marginBottom: 6 }}>
              <div style={{ fontSize: 14, fontWeight: 500, color: "#1d1d1f" }}>{c.k}</div>
              <div style={{ fontSize: 12, color: "#6e6e73", marginTop: 3 }}>{c.e.split("\n")[0]}{c.e.includes("\n") ? "…" : ""}</div>
              <div style={{ fontSize: 11, color: "#aeaeb2", marginTop: 3 }}>{c.inn ? `다음 복습: ${c.nr}` : "아직 안 시작"} · {c.ty}</div>
            </div>
          ))}
        </div>
      )}

      {tab === "settings" && (
        <div>
          {/* 레벨 목록 */}
          {(() => {
            const totalReps = cards.reduce((s, c) => s + (c.rp || 0), 0);
            const curLv = getLevel(totalReps);
            return (
              <div style={{ marginBottom: 24 }}>
                <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 4, color: "#1d1d1f" }}>레벨</div>
                <div style={{ fontSize: 12, color: "#6e6e73", marginBottom: 12 }}>총 복습 횟수로 레벨이 올라가</div>
                <div style={{ display: "grid", gap: 6 }}>
                  {LEVELS.map(l => {
                    const isCur = l.lv === curLv.lv;
                    return (
                      <div key={l.lv} style={{
                        display: "flex", justifyContent: "space-between", padding: "8px 12px",
                        background: isCur ? "#e8f0fb" : "#f2f2f7", borderRadius: 8,
                        border: isCur ? "1.5px solid #0071e3" : "1.5px solid transparent",
                        fontSize: 13
                      }}>
                        <span style={{ fontWeight: isCur ? 700 : 400, color: isCur ? "#0071e3" : "#1d1d1f" }}>
                          {l.emoji} Lv.{l.lv} {l.name}{isCur ? " (현재)" : ""}
                        </span>
                        <span style={{ color: isCur ? "#0071e3" : "#6e6e73", fontWeight: isCur ? 600 : 400 }}>{l.min}회</span>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })()}

          <div style={{ marginBottom: 24 }}>
            <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 4, color: "#1d1d1f" }}>하루 카드 수</div>
            <div style={{ fontSize: 12, color: "#6e6e73", marginBottom: 12 }}>하루에 복습할 카드 개수를 정해</div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 8 }}>
              {[5, 7, 10, 15].map(n => (
                <button key={n} onClick={() => changePerDay(n)} style={{
                  padding: "12px 0", borderRadius: 10, fontSize: 15, fontWeight: 600, cursor: "pointer",
                  border: "1px solid", borderColor: perDay === n ? "#0071e3" : "#d2d2d7",
                  background: perDay === n ? "#e8f0fb" : "#ffffff",
                  color: perDay === n ? "#0071e3" : "#6e6e73"
                }}>{n}개</button>
              ))}
            </div>
          </div>

          <div style={{ marginBottom: 24 }}>
            <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 12, color: "#1d1d1f" }}>진행 현황</div>
            <div style={{ background: "#e8e8ed", borderRadius: 10, padding: 16 }}>
              {[["전체 카드", `${cards.length}개`], ["시작한 카드", `${cards.filter(c => c.inn).length}개`], ["완료한 카드", `${cards.filter(c => c.inn).length} / ${cards.length}개`]].map(([label, val]) => (
                <div key={label} style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                  <span style={{ fontSize: 13, color: "#6e6e73" }}>{label}</span>
                  <span style={{ fontSize: 13, fontWeight: 600, color: "#1d1d1f" }}>{val}</span>
                </div>
              ))}
              <div style={{ height: 6, background: "#d2d2d7", borderRadius: 3, marginTop: 4, overflow: "hidden" }}>
                <div style={{ height: "100%", width: `${cards.length > 0 ? Math.round((cards.filter(c => c.inn).length / cards.length) * 100) : 0}%`, background: "#0071e3", borderRadius: 3 }} />
              </div>
            </div>
          </div>

          <div style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 4, color: "#1d1d1f" }}>백업 & 복원</div>
            <div style={{ fontSize: 12, color: "#6e6e73", marginBottom: 12 }}>JSON 백업 파일로 데이터 복원</div>
            <label style={{ display: "block", width: "100%", padding: 11, background: "#ffffff", border: "1px solid #d2d2d7", borderRadius: 10, fontSize: 14, cursor: "pointer", textAlign: "center", color: "#0071e3" }}>
              📂 백업 파일에서 복원
              <input type="file" accept=".json" style={{ display: "none" }} onChange={async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const text = await file.text();
                try {
                  const parsed = JSON.parse(text);
                  const cards = parsed.cards || [];
                  const streak = parsed.streak || { c: 0, l: "" };
                  const perDay = parsed.perDay || 5;
                  await saveAll(cards, streak, perDay);
                  setCards(cards);
                  setStreak(streak.c);
                  setPerDay(perDay);
                  buildQueue(cards, perDay);
                  showToast("복원 완료! 🎉");
                } catch(err) {
                  showToast("복원 실패 ㅠ 파일 확인해줘");
                }
              }} />
            </label>
          </div>

          <div>
            <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 4, color: "#ff3b30" }}>데이터 초기화</div>
            <div style={{ fontSize: 12, color: "#6e6e73", marginBottom: 12 }}>모든 복습 기록과 스트릭이 사라져. 되돌릴 수 없어.</div>
            {!confirmReset ? (
              <button onClick={() => setConfirmReset(true)} style={{ width: "100%", padding: 11, background: "#ffffff", border: "1px solid #ff3b30", borderRadius: 10, fontSize: 14, cursor: "pointer", color: "#ff3b30" }}>처음부터 다시 시작</button>
            ) : (
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                <button onClick={() => setConfirmReset(false)} style={{ padding: 11, background: "#ffffff", border: "1px solid #d2d2d7", borderRadius: 10, fontSize: 14, cursor: "pointer", color: "#6e6e73" }}>취소</button>
                <button onClick={resetData} style={{ padding: 11, background: "#ff3b30", border: "none", borderRadius: 10, fontSize: 14, cursor: "pointer", color: "#fff", fontWeight: 600 }}>정말 초기화</button>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

    const domNode = document.getElementById('root');
    const root = ReactDOM.createRoot(domNode);
    root.render(React.createElement(App));
  </script>
</body>
</html>
